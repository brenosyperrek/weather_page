# Configuracao do Nginx que serve o build estatico do React (Vite) e repassa as
# chamadas de API para o container do backend dentro da rede do docker-compose.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html, deixando o React Router
    # (se algum dia for adicionado) ou a propria pagina lidar com a navegacao.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Encaminha /api/* para o servico "backend" do docker-compose (porta 8000), na
    # mesma rede interna do compose -- o navegador nunca acessa o backend diretamente.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
